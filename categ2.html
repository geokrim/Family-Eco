<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/familyeco_logo.png" type="image/png" />
    <title>Category 2</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
      rel="stylesheet"
    />
    <link href="css/dsk_css.css" rel="stylesheet" />
  </head>
  <body
    onload="checkSession(); menu_dsk_load(); getAllCateg2IntoTable();"
    
  >
    <div class="top-bar mb-4" id="menuDesk"></div>
    <div class="card mb-4">
      <div class="card-header">Create / Update Category 2</div>
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-2">
            <label class="form-label">Id</label>
            <input type="text" class="form-control" id="id" value="New" readonly />
          </div>
          <div class="col-md-6">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" id="descr" />
          </div>
          <div class="col-md-2">
            <label class="form-label">Type</label>
            <div class="form-check form-switch mt-2">
              <input
                class="form-check-input"
                type="checkbox"
                id="incomeSwitch"
              />
              <label class="form-check-label">Income / Expense</label>
            </div>
          </div>
        </div>
        <div class="row g-3 mt-2">
          <div class="col-12">
            <div class="d-flex gap-2 categ-buttons">
              <button
                class="btn btn-secondary flex-fill"
                onclick="clearCateg2Form()"
              >
                Clear
              </button>
              <button
                class="btn btn-success flex-fill"
                onclick="saveUpdateCateg2()"
              >
                Save
              </button>
              <button
                class="btn btn-danger flex-fill"
                onclick="deleteCateg2($('#id').val())"
              >
                Delete
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Category 2 Records</div>
      <div class="card-body">
        <table id="categ2Table" class="display" style="width: 100%">
          <thead>
            <tr>
              <th style="display: none">Id</th>
              <th>Description</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="jsLib/index.js"></script>
    <script src="jsLib/creds.js"></script>
    <script src="jsLib/menu.js"></script>
    <script src="jsLib/categ2.js"></script>
  </body>
</html>
